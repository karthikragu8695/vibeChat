name: vibechat
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  image_picker: ^1.2.1
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/icon.webp

# =========================
# APP ICON CONFIG (MUST BE HERE, NOT INSIDE dependencies)
# =========================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.webp"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/icon.webp"